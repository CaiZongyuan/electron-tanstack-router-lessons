# 打包并发布 desktop 安装包到 GitHub Releases（见 docs/daemon/09）。
# 触发：push tag v* （如 v0.0.1）。也可在 Actions 页手动 Run workflow（仅构建，不打 release）。
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# 创建 Release 需要写权限。
permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # 不指定 version：自动读 package.json 的 packageManager（pnpm@10.12.3），
        # 否则与 packageManager 冲突报 ERR_PNPM_BAD_PM_VERSION。

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build daemon (tsup → dist/main.cjs)
        run: pnpm --filter @demo/daemon build

      - name: Build desktop (electron-vite)
        run: pnpm -C apps/desktop exec electron-vite build

      - name: Package (electron-builder → win nsis)
        run: pnpm -C apps/desktop exec electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
